<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="d-flex justify-content-center align-items-center vh-100 bg-light">

<div class="card p-4" style="width: 300px;">
    <h4 class="text-center">Login</h4>

    <input type="text" id="usuario" class="form-control mb-2" placeholder="Usuario">
    <input type="password" id="password" class="form-control mb-3" placeholder="Contraseña">

    <button class="btn btn-primary w-100" onclick="login()">Ingresar</button>
</div>

<script src="login.js"></script>
</body>
</html>
