<h3>Configuración</h3>

<button onclick="modoOscuro()">Modo Oscuro</button>
<button onclick="borrarTodo()">Borrar Datos</button>

<script>
function modoOscuro(){
    document.body.style.background = "black";
    document.body.style.color = "white";
}

function borrarTodo(){
    localStorage.removeItem("estudiantes");
    alert("Datos eliminados");
}
</script>
