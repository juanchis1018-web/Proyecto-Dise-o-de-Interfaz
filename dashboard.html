<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            color: white;
        }

        .card {
            border-radius: 15px;
            transition: 0.3s;
            cursor: pointer;
        }

        .card:hover {
            transform: scale(1.05);
        }

        .icon {
            font-size: 40px;
        }
    </style>
</head>

<body>

<div class="container mt-5">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>📊 Panel Principal</h2>
        <button class="btn btn-danger" onclick="logout()">Salir</button>
    </div>

    <div class="row g-4">

        <div class="col-md-3">
            <div class="card p-4 text-center bg-primary" onclick="ir('index.html')">
                <div class="icon">🎓</div>
                <h5>Estudiantes</h5>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card p-4 text-center bg-success" onclick="ir('reportes.html')">
                <div class="icon">📈</div>
                <h5>Reportes</h5>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card p-4 text-center bg-info" onclick="ir('perfil.html')">
                <div class="icon">👤</div>
                <h5>Perfil</h5>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card p-4 text-center bg-secondary" onclick="ir('config.html')">
                <div class="icon">⚙️</div>
                <h5>Configuración</h5>
            </div>
        </div>

    </div>

</div>

<script>

// PROTECCIÓN LOGIN
if (localStorage.getItem("login") !== "true") {
    window.location.href = "login.html";
}

// NAVEGACIÓN
function ir(pagina){
    window.location.href = pagina;
}

// LOGOUT
function logout(){
    localStorage.removeItem("login");
    window.location.href = "login.html";
}

</script>

</body>
</html>
