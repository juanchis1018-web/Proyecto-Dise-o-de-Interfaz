<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Materias</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: white;
}
.card {
    border-radius: 15px;
}
</style>
</head>

<body>

<div class="container mt-5">

    <button class="btn btn-dark mb-3" onclick="volver()">⬅ Dashboard</button>

    <h2>📚 Materias del Estudiante</h2>

    <div class="card p-3 mb-3 text-dark">

        <input id="materia" class="form-control mb-2" placeholder="Nombre de materia">
        <input id="corte1" type="number" class="form-control mb-2" placeholder="Nota Corte 1">
        <input id="corte2" type="number" class="form-control mb-2" placeholder="Nota Corte 2">

        <button class="btn btn-success" onclick="agregarMateria()">Agregar Materia</button>

    </div>

    <table class="table table-light text-center">
        <thead>
            <tr>
                <th>Materia</th>
                <th>Corte 1</th>
                <th>Corte 2</th>
            </tr>
        </thead>
        <tbody id="tablaMaterias"></tbody>
    </table>

</div>

<script src="materias.js"></script>

</body>
</html>
