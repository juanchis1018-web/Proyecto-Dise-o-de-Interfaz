<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Gestión de Estudiantes</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #36d1dc, #5b86e5);
            color: white;
        }

        .card {
            border-radius: 15px;
        }

        table {
            background: white;
            color: black;
        }
    </style>
</head>

<body>

<div class="container mt-5">

    <!-- NAV -->
    <div class="d-flex justify-content-between align-items-center mb-3">
        <button class="btn btn-dark" onclick="irDashboard()">⬅ Dashboard</button>
        <h2>🎓 Gestión de Estudiantes</h2>
        <button class="btn btn-danger" onclick="logout()">Salir</button>
    </div>

    <!-- FORMULARIO -->
    <div class="card p-3 mb-3 text-dark">

        <input type="hidden" id="id">

        <input type="text" id="idEstudiante" class="form-control mb-2" placeholder="ID Estudiante">
        <input type="text" id="nombre" class="form-control mb-2" placeholder="Nombre">
        <input type="number" id="edad" class="form-control mb-2" placeholder="Edad">
        <input type="email" id="correo" class="form-control mb-2" placeholder="Correo">
        <input type="text" id="curso" class="form-control mb-2" placeholder="Curso">

        <button class="btn btn-primary mb-2" onclick="guardarEstudiante()">Guardar</button>
        <button class="btn btn-secondary" onclick="limpiarFormulario()">Limpiar</button>

    </div>

    <!-- BUSCADOR -->
    <input type="text" id="buscar" class="form-control mb-2" placeholder="Buscar..." onkeyup="buscarEstudiante()">

    <button class="btn btn-info mb-3" onclick="ordenarAZ()">Ordenar A-Z</button>

    <!-- TABLA -->
    <table class="table table-bordered text-center">
    
    <thead class="table-dark">
        <tr>
            <th>ID</th>
            <th>Nombre</th>
            <th>Edad</th>
            <th>Correo</th>
            <th>Curso</th>
            <th>Acciones</th>
        </tr>
    </thead>

    <tbody id="tablaEstudiantes"></tbody>

</table>

</div>

<!-- TOAST -->
<div class="position-fixed bottom-0 end-0 p-3">
    <div id="toast" class="toast align-items-center text-bg-success border-0">
        <div class="d-flex">
            <div class="toast-body" id="toastMsg"></div>
        </div>
    </div>
</div>

<!-- JS -->
<script src="script.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
function irDashboard(){
    window.location.href = "dashboard.html";
}
</script>

</body>
</html>
